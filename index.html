<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rakshu Chat UI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="app-layout d-flex">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="btn btn-new-chat w-100" id="newChatBtn">
                    <i class="fa-solid fa-plus me-2"></i>New Chat
                </button>
            </div>

            <div class="chat-history-section">
                <div class="sidebar-section-title">Chat History</div>
                <div class="chat-history" id="chatHistory">
                    <div class="history-item active">Welcome Conversation</div>
                    <div class="history-item">Project Help</div>
                    <div class="history-item">UI Suggestions</div>
                </div>
            </div>

            <div class="sidebar-profile">
                <div class="profile-avatar">R</div>
                <div>
                    <h6 class="mb-0">Rakshu</h6>
                    <small class="text-muted-custom">Student</small>
                </div>
            </div>
        </aside>

        <!-- Overlay for mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Chat Area -->
        <div class="chat-root flex-grow-1 d-flex flex-column">
            <header class="chat-header d-flex align-items-center justify-content-between">
                <button class="btn btn-icon d-lg-none" id="menuToggle" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h5 class="mb-0 fw-semibold">Rakshu Chat UI</h5>
                <span class="status-pill">Online</span>
            </header>

            <main class="chat-main flex-grow-1" id="chatMain">
                <section class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <h2>Hello , Delulu</h2>
                    <p>How can I help you today?</p>

                    <div class="suggestion-grid">
                        <button class="suggestion-card" data-text="Create a responsive pricing section.">
                            <i class="fa-solid fa-layer-group"></i>
                            <h6>Create UI</h6>
                            <p>Generate a responsive webpage section</p>
                        </button>

                        <button class="suggestion-card" data-text="Give me JavaScript interview questions.">
                            <i class="fa-solid fa-code"></i>
                            <h6>Practice Coding</h6>
                            <p>Improve your frontend interview skills</p>
                        </button>

                        <button class="suggestion-card" data-text="Write a short professional bio for portfolio.">
                            <i class="fa-solid fa-pen"></i>
                            <h6>Write Content</h6>
                            <p>Generate polished text quickly</p>
                        </button>

                        <button class="suggestion-card" data-text="Help me debug a CSS alignment issue.">
                            <i class="fa-solid fa-bug"></i>
                            <h6>Debug Help</h6>
                            <p>Find and fix frontend UI bugs</p>
                        </button>
                    </div>
                </section>

                <section class="messages" id="messages"></section>

                <div class="typing-indicator d-none" id="typingIndicator">
                    <div class="msg-row assistant">
                        <div class="avatar assistant-avatar">AI</div>
                        <div class="bubble-wrap">
                            <div class="message-meta">
                                <span class="name">Assistant</span>
                                <span class="time">typing...</span>
                            </div>
                            <div class="message-bubble assistant-bubble">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <section class="input-area">
                <div class="input-box">
                    <button class="btn btn-icon" aria-label="Attach file">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>

                    <textarea id="messageInput" rows="1" placeholder="Type your message..."></textarea>

                    <button class="btn btn-send" id="sendBtn" disabled aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <p class="input-footer">Press Enter to send, Shift + Enter for new line.</p>
            </section>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./chat.js"></script>
</body>

</html>
